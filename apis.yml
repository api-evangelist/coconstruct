aid: coconstruct
name: CoConstruct
description: >-
  CoConstruct is a residential construction management software platform
  originally founded in 2005 in Charlottesville, Virginia by Donny Wyatt
  to help custom home builders and remodelers manage projects, budgets,
  selections, client communications, scheduling, and financial workflows
  in a single web and mobile application. The product served thousands of
  custom builders across the United States and was paired with CBUSA, a
  homebuilder group purchasing organization CoConstruct previously
  acquired. On February 24, 2021, CoConstruct was acquired by Buildertrend
  of Omaha, Nebraska, with growth funding from Bain Capital Tech
  Opportunities, HGGC, and Serent Capital, creating a combined company
  serving 23,000+ clients, 1.1M+ users, and $200B+ in annual construction
  project value. By 2022 Buildertrend had merged the two products into a
  single unified Buildertrend platform and migrated CoConstruct customers
  off the legacy product. CoConstruct historically operated a developer
  portal at developer.coconstruct.com exposing APIs for project,
  financial, and scheduling data, but as of the merger CoConstruct has
  paused new API development — "we are not establishing new API
  endpoints or connecting additional users to existing endpoints" — and
  the developer portal now redirects to a static notice page. Existing
  API connections are reportedly maintained but no public OpenAPI
  specification, SDK, or open-source release is published. Net-new
  integration work is directed to Buildertrend's own platform and
  partner program.
